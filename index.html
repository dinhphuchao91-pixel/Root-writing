<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ROOT Writing Marker</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f5f6f8;color:#1f2937;font-size:14px;line-height:1.5}

/* ───── Header ───── */
header{background:#fff;border-bottom:1px solid #e5e7eb;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:15px;color:#111827}
.brand-icon{width:32px;height:32px;background:linear-gradient(135deg,#16a34a,#15803d);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px}
.api-bar{display:flex;align-items:center;gap:8px}
.api-bar label{font-size:12px;color:#6b7280;font-weight:500}
.api-bar input{padding:6px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;font-family:inherit;width:280px;background:#f9fafb;transition:.15s}
.api-bar input:focus{outline:none;border-color:#16a34a;background:#fff;box-shadow:0 0 0 3px rgba(22,163,74,.1)}
.api-bar button{padding:6px 14px;background:#16a34a;color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s}
.api-bar button:hover{background:#15803d}
.api-bar .saved{color:#16a34a;font-size:12px;font-weight:600;display:none}
.api-bar .saved.show{display:inline}

/* ───── Layout ───── */
.app{display:grid;grid-template-columns:1fr 440px;height:calc(100vh - 56px)}
@media(max-width:960px){.app{grid-template-columns:1fr;height:auto}}

/* ───── Left panel ───── */
.left{padding:24px 28px;overflow-y:auto;border-right:1px solid #e5e7eb;background:#fff}
.panel{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:18px 20px;margin-bottom:14px}
.panel h2{font-size:14px;font-weight:700;color:#111827;letter-spacing:-.01em}
.panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.btn-demo{padding:5px 11px;background:#fef3c7;color:#92400e;border:1px solid #fde68a;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:.12s}
.btn-demo:hover{background:#fde68a;border-color:#facc15}
.row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:12px;font-weight:600;color:#374151}
.field input,.field select,.field textarea{padding:9px 12px;border:1px solid #d1d5db;border-radius:7px;font-size:14px;font-family:inherit;background:#fff;transition:.15s}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:#16a34a;box-shadow:0 0 0 3px rgba(22,163,74,.1)}
.field select{cursor:pointer}
.field textarea{resize:vertical;min-height:170px;line-height:1.65}
.prompt-display{background:#f9fafb;border:1px solid #e5e7eb;border-radius:7px;padding:11px 13px;font-size:13px;color:#374151;line-height:1.6;min-height:46px}
.prompt-display.empty{color:#9ca3af;font-style:italic}
.word-count{font-size:12px;text-align:right;margin-top:4px;font-weight:500}
.word-count.ok{color:#16a34a}
.word-count.low{color:#dc2626}
.btn-primary{width:100%;padding:11px;background:#111827;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:6px;transition:.15s}
.btn-primary:hover:not(:disabled){background:#1f2937}
.btn-primary:disabled{background:#9ca3af;cursor:not-allowed}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-banner{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;padding:10px 13px;border-radius:7px;font-size:13px;margin-top:10px;white-space:pre-wrap}

/* ───── Result view ───── */
.result-view{display:none}
.result-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.result-name{font-size:18px;font-weight:700;color:#111827}
.chip{padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600;background:#f3f4f6;color:#374151;border:1px solid #e5e7eb}
.chip.green{background:#f0fdf4;color:#15803d;border-color:#bbf7d0}
.chip.blue{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe}
.btn-reset{margin-left:auto;font-size:12px;color:#6b7280;background:#fff;border:1px solid #d1d5db;padding:6px 12px;border-radius:6px;cursor:pointer;font-family:inherit;font-weight:500}
.btn-reset:hover{background:#f9fafb;border-color:#9ca3af}
.legend{display:flex;gap:18px;margin-bottom:18px;padding:12px 16px;background:#fafbfc;border-radius:8px;border:1px solid #f3f4f6;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:7px;font-size:12px;color:#6b7280;font-weight:500}
.legend-chip{padding:2px 9px;border-radius:4px;font-size:11px;font-weight:700;letter-spacing:.02em}
.legend-gr{background:#fef08a;color:#854d0e}
.legend-lr{background:#86efac;color:#14532d}
.legend-approved{color:#16a34a;font-weight:700}

/* ───── Essay rendered (CRM style: strikethrough + pill) ───── */
.essay-view{font-size:16px;line-height:2.4;color:#1f2937;white-space:pre-wrap;padding:8px 4px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}

/* Wrong text — red strikethrough, no background */
.essay-view span.err-grammar > s,
.essay-view span.err-vocab > s{
  color:#9ca3af;
  text-decoration:line-through;
  text-decoration-color:#dc2626;
  text-decoration-thickness:2px;
  background:transparent;
  font-weight:400;
  margin-right:2px;
}

/* Correct text — yellow pill (grammar) */
.essay-view span.err-grammar > mark{
  display:inline-block;
  background:#fde047;
  color:#1f2937;
  padding:1px 8px;
  border-radius:5px;
  font-weight:700;
  font-size:12.5px;
  letter-spacing:.05em;
  text-transform:uppercase;
  vertical-align:baseline;
  line-height:1.5;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

/* Correct text — green pill (vocabulary) */
.essay-view span.err-vocab > mark{
  display:inline-block;
  background:#86efac;
  color:#14532d;
  padding:1px 8px;
  border-radius:5px;
  font-weight:700;
  font-size:12.5px;
  letter-spacing:.05em;
  text-transform:uppercase;
  vertical-align:baseline;
  line-height:1.5;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

/* Span wrapper — clickable but no background */
.essay-view span.err-grammar,
.essay-view span.err-vocab{
  cursor:pointer;
  transition:all .12s;
  display:inline;
  border-radius:3px;
  padding:0 1px;
}
.essay-view span.err-grammar:hover{background:rgba(253,224,71,.25)}
.essay-view span.err-vocab:hover{background:rgba(134,239,172,.3)}
.essay-view span.err-grammar.is-active{background:rgba(253,224,71,.5);outline:2px solid #2563eb;outline-offset:2px}
.essay-view span.err-vocab.is-active{background:rgba(134,239,172,.5);outline:2px solid #2563eb;outline-offset:2px}

.essay-view s:empty,.essay-view mark:empty{display:none}
.essay-view span.is-approved::after{content:'✓';font-size:10px;color:#15803d;vertical-align:super;margin-left:2px;font-weight:700}
.essay-view span.is-deleted{opacity:.35;cursor:default!important}
.essay-view span.is-deleted > mark{background:#e5e7eb!important;color:#9ca3af!important}

/* ───── Right panel ───── */
.right{background:#fafbfc;border-left:1px solid #e5e7eb;display:flex;flex-direction:column;height:100%;overflow:hidden}
.right-head{padding:14px 18px;border-bottom:1px solid #e5e7eb;background:#fff;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.right-title{font-size:14px;font-weight:700;color:#111827}
.stat-group{display:flex;gap:6px}
.stat{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.stat-red{background:#fef2f2;color:#dc2626}
.stat-green{background:#f0fdf4;color:#15803d}
.cards-area{flex:1;overflow-y:auto;padding:14px}
.cards-empty{text-align:center;color:#9ca3af;font-size:13px;padding:60px 20px;line-height:1.8}

/* ───── Comment Card ───── */
.cmt{background:#fff;border:1.5px solid #e5e7eb;border-radius:10px;margin-bottom:10px;overflow:hidden;cursor:pointer;transition:.15s}
.cmt:hover{border-color:#9ca3af;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.cmt.is-active{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.cmt.is-approved{border-color:#16a34a;background:#f0fdf4}
.cmt.is-editing{border-color:#2563eb;background:#eff6ff}

.cmt-head{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid #f3f4f6;flex-wrap:wrap}
.cmt-subhead{padding:5px 14px;font-size:11.5px;color:#6b7280;font-weight:600;background:#fafbfc;border-bottom:1px solid #f3f4f6;letter-spacing:.01em}
.cmt-badge{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.04em;flex-shrink:0}
.cmt-badge.gr{background:#fef9c3;color:#854d0e;border:1px solid #fde047}
.cmt-badge.lr{background:#dcfce7;color:#166534;border:1px solid #86efac}
.cmt-correction{font-size:13px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;flex:1;min-width:0}
.cmt-correction s{color:#9ca3af;text-decoration:line-through;text-decoration-color:#dc2626;text-decoration-thickness:1.8px;background:transparent;padding:0;font-size:13px;font-weight:400}
.cmt-correction mark{display:inline-block;background:#fde047;color:#1f2937;padding:1px 7px;border-radius:4px;font-weight:700;font-size:11.5px;letter-spacing:.04em;text-transform:uppercase;line-height:1.5}
.cmt-correction.lr mark{background:#86efac;color:#14532d}
.cmt-arrow{display:none}
.cmt-num{margin-left:auto;font-size:11px;color:#9ca3af;font-weight:600;flex-shrink:0}
.cmt-checkmark{color:#16a34a;font-weight:700;font-size:14px;flex-shrink:0}

.cmt-body{padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.cmt-text{font-size:13px;color:#374151;line-height:1.65;padding:6px 0}
.cmt-text b{color:#1d4ed8;font-weight:700}
.cmt-text-skipped{color:#9ca3af;font-style:italic;font-size:12.5px}
.cmt-textarea{width:100%;padding:9px 11px;border:1.5px solid #d1d5db;border-radius:6px;font-size:13px;line-height:1.65;font-family:inherit;resize:none;overflow:hidden;background:#fff;color:#1f2937;min-height:64px;transition:.15s}
.cmt-textarea:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.cmt-textarea::placeholder{color:#9ca3af;font-style:italic}

/* AI hint */
.ai-hint{display:flex;flex-direction:column;gap:6px}
.btn-ai{align-self:flex-start;display:inline-flex;align-items:center;gap:5px;padding:5px 11px;background:#faf5ff;color:#7e22ce;border:1px solid #e9d5ff;border-radius:5px;font-size:11.5px;font-weight:600;cursor:pointer;font-family:inherit;transition:.12s}
.btn-ai:hover{background:#f3e8ff;border-color:#c084fc}
.btn-ai .icon{font-size:13px}
.ai-panel{background:#faf5ff;border:1px solid #e9d5ff;border-radius:6px;padding:9px 11px;font-size:12.5px;color:#581c87;line-height:1.6;display:none}
.ai-panel.show{display:block}
.ai-panel .ai-label{font-size:10.5px;font-weight:700;color:#7e22ce;letter-spacing:.04em;margin-bottom:4px}
.ai-panel .ai-text{color:#4c1d95;margin-bottom:7px}
.ai-panel .ai-text b{color:#6b21a8;font-weight:700}
.ai-panel .ai-actions{display:flex;gap:6px}
.btn-use-ai{padding:4px 10px;background:#7e22ce;color:#fff;border:none;border-radius:4px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-use-ai:hover{background:#6b21a8}
.btn-close-ai{padding:4px 10px;background:#fff;color:#7e22ce;border:1px solid #d8b4fe;border-radius:4px;font-size:11px;font-weight:500;cursor:pointer;font-family:inherit}
.btn-close-ai:hover{background:#f3e8ff}

/* Skipped state */
.cmt.is-skipped{background:#fafafa;opacity:.78}
.cmt.is-skipped .cmt-correction{opacity:.6}

.cmt-actions{display:flex;gap:6px;padding:9px 14px;border-top:1px solid #f3f4f6;background:#fafbfc;align-items:center}
.btn-sm{padding:5px 12px;border-radius:5px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:600;border:none;transition:.12s}
.btn-approve{background:#16a34a;color:#fff}
.btn-approve:hover{background:#15803d}
.btn-edit{background:#fff;color:#374151;border:1px solid #d1d5db;font-weight:500}
.btn-edit:hover{background:#f9fafb;border-color:#9ca3af}
.btn-save{background:#2563eb;color:#fff}
.btn-save:hover{background:#1d4ed8}
.btn-cancel{background:#fff;color:#6b7280;border:1px solid #d1d5db;font-weight:500}
.btn-cancel:hover{background:#f9fafb}
.btn-delete{background:transparent;color:#ef4444;border:1px solid #fecaca;margin-left:auto;padding:5px 9px;font-weight:500}
.btn-delete:hover{background:#fef2f2}

/* ───── Right footer ───── */
.right-foot{padding:12px 14px;border-top:1px solid #e5e7eb;background:#fff;flex-shrink:0;display:flex;flex-direction:column;gap:8px}
.btn-approve-all{padding:9px;background:#f0fdf4;color:#15803d;border:1.5px solid #bbf7d0;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-approve-all:hover:not(:disabled){background:#dcfce7}
.btn-approve-all:disabled{opacity:.5;cursor:not-allowed}
.btn-copy-all{padding:10px;background:#16a34a;color:#fff;border:none;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-copy-all:hover:not(:disabled){background:#15803d}
.btn-copy-all:disabled{opacity:.5;cursor:not-allowed;background:#9ca3af}
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-icon">✏️</div>
    ROOT Writing Marker
  </div>
  <div class="api-bar">
    <label>API Key:</label>
    <input type="password" id="api-key" placeholder="sk-ant-api03-..."/>
    <button onclick="saveKey()">Lưu</button>
    <span class="saved" id="key-saved">✓ Đã lưu</span>
  </div>
</header>

<div class="app">

  <!-- LEFT -->
  <div class="left">
    <!-- INPUT FORM -->
    <div id="input-view">
      <div class="panel">
        <div class="panel-head">
          <h2>Bài làm của học sinh</h2>
          <button class="btn-demo" onclick="loadDemo()" title="Tải bài demo để test nhanh">📄 Bài demo</button>
        </div>
        <div class="field">
          <textarea id="essay" placeholder="Paste bài viết của học sinh vào đây..." oninput="onEssayInput()"></textarea>
          <div class="word-count low" id="word-count">0 từ</div>
        </div>
        <button class="btn-primary" id="btn-grade" onclick="gradeEssay()" disabled>Chấm bài</button>
        <div id="error-banner" class="error-banner" style="display:none"></div>
      </div>
    </div>

    <!-- RESULT VIEW -->
    <div id="result-view" class="result-view">
      <div class="result-header">
        <span class="chip green">✓ Đã chấm xong</span>
        <button class="btn-reset" onclick="resetAll()">↺ Chấm bài khác</button>
      </div>

      <div class="legend">
        <div class="legend-item"><span class="legend-chip legend-gr">GR</span> Lỗi ngữ pháp</div>
        <div class="legend-item"><span class="legend-chip legend-lr">LR</span> Lỗi từ vựng</div>
        <div class="legend-item"><span class="legend-approved">✓</span> Đã duyệt</div>
      </div>
      <div class="essay-view" id="essay-view"></div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="right-head">
      <span class="right-title">Nhận xét chi tiết</span>
      <div class="stat-group">
        <span class="stat stat-red" id="stat-total">0 lỗi</span>
        <span class="stat stat-green" id="stat-approved">0 nhận xét</span>
      </div>
    </div>

    <div class="cards-area" id="cards-area">
      <div class="cards-empty">Nhập API key + bài viết<br>rồi nhấn "Chấm bài" để xem nhận xét</div>
    </div>

    <div class="right-foot">
      <button class="btn-approve-all" id="btn-approve-all" onclick="useAiForAll()" disabled>💡 Dùng comment AI cho ô trống</button>
      <button class="btn-copy-all" id="btn-copy-all" onclick="copyAll()" disabled>Copy tất cả nhận xét đã duyệt</button>
    </div>
  </div>

</div>

<script>
// ════ Week data ════
const WEEK_DATA = {
  1:'harm sb/sth | allow sb to do sth / at an early age | spend time doing sth / before an exam | force sb to do sth / extra after-school classes | spend money on sth / savings / district 1 | violent content / influence sb/sth / behaviour',
  2:'consider (v) / apply to sth / vì → because + S-FV | ask sb to do sth / homework | make sb + adj / office worker / burnout | unlike + N / decide (v) / challenging (adj) | provide sb with sth / job opportunity | discuss / future plan / before + V-ing / drop out of',
  3:'cancel / trip / problem / flight | flight / depart / prepare / visit | during + noun / quiet / hometown / congestion | job opportunities / access | the authorities / encourage / tourism industry / economy',
  4:'risk (n) / disease (n) | thường / quá nhiều | stressed / because + S-FV / enough | household chores / food delivery app | lifestyle / such as + V-ing',
  5:'academic results / focus on / studies | thanks to / after + V-ing | option / work environment | announcement / sales department / pay rise | business trip / eventually | savings / eat out',
  6:'Nối câu bằng adj clause (Ex1) | Viết câu có adj clause: platform / course / Google Translate / aim / policy (Ex2)',
  7:"aware / tourist destination | Western country / nuclear | heavy industry / untreated waste | plastic waste / wild animal species | find (v) = cảm thấy | ozone layer / sun's radiation / greenhouse gases",
  8:'sell / district 1 / colleague | cancel / trip / plan | consider / drugs / back then | dominate | overtime | punish / litter / regulation',
  9:'6 phần A-F: Viết câu | Sửa lỗi | Adj/Adv | Prep phrase | Adj clause | Adj clause + conjunctions',
};

// ════ State ════
let errors = [];          // [{id, type, ai_comment, wrong, right}]
let cardStates = {};      // { id: {text, approved, editing, deleted} }
let activeId = null;

// ════ Utils ════
function $(sel){return document.querySelector(sel);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function renderBold(s){return esc(s).replace(/\*\*(.+?)\*\*/g,'<b>$1</b>');}

// ════ API Key ════
function saveKey(){
  const k=$('#api-key').value.trim();
  if(!k) return;
  localStorage.setItem('root_api_key',k);
  const s=$('#key-saved');
  s.classList.add('show');
  setTimeout(()=>s.classList.remove('show'),2000);
  checkGradeBtn();
}
(function loadKey(){
  const k=localStorage.getItem('root_api_key');
  if(k){$('#api-key').value=k;$('#key-saved').classList.add('show');setTimeout(()=>$('#key-saved').classList.remove('show'),1500);}
})();
$('#api-key').addEventListener('input',checkGradeBtn);

// ════ Demo essay (mix lỗi từ nhiều tuần để test prompt) ════
const DEMO_ESSAY = `1. I cancel my business trip to Ha Noi because I have a problem with new project. I just book another flight next Monday.
2. My flight will take off at 4 p.m today. I prepared for carefully. Since I arrived, I will visit my friend house.
3. During ceremony, street in TPHCM are quiet because everybody will go to their hometown. And when ceremony ends, street return crowded and congestion everywhere.
4. She considering to moving to TPHCM to have more job oppotunities and get access to good education in the future.
5. The authorities encourage people work in an tourism industry to grow the economy local. However, a lot of people disinterest with this job because these day it not to find a good job in an tourism industry.`;

function loadDemo(){
  const ta=$('#essay');
  ta.value=DEMO_ESSAY;
  onEssayInput();
  ta.focus();
}

// ════ Form helpers ════
function onEssayInput(){
  const t=$('#essay').value.trim();
  const n=t?t.split(/\s+/).length:0;
  const el=$('#word-count');
  el.textContent=n+' từ';
  el.className='word-count '+(n>=10?'ok':'low');
  checkGradeBtn();
}
function checkGradeBtn(){
  const ok=$('#api-key').value.trim()
        && $('#essay').value.trim().split(/\s+/).filter(Boolean).length>=5;
  $('#btn-grade').disabled=!ok;
}

// ════ Grade essay ════
async function gradeEssay(){
  const essay=$('#essay').value.trim();
  const apiKey=$('#api-key').value.trim();
  const btn=$('#btn-grade');
  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span>Đang chấm...';
  $('#error-banner').style.display='none';

  try{
    const res=await fetch('/api/grade',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({essay,apiKey}),
    });
    const data=await res.json();
    if(!res.ok){
      if(res.status===401) throw new Error('API key không hợp lệ.');
      if(res.status===429) throw new Error('Rate limit. Chờ một lúc rồi thử lại.');
      // If AI returned non-JSON, show debug info
      let msg=data?.error||'Lỗi server.';
      if(data?.debug){
        console.error('AI raw response:',data.debug);
        msg+='\n\n[Debug] AI trả về:\n'+(data.debug.rawPreview||'')+(data.debug.rawLength>500?'... ('+data.debug.rawLength+' ký tự)':'');
      }
      throw new Error(msg);
    }

    const correctedHtml=data.corrected_html||'';
    errors=parseErrors(data.errors||[],correctedHtml);
    cardStates={};
    errors.forEach(e=>{
      cardStates[e.id]={
        text:'',                       // GV's comment (empty by default)
        aiText:e.ai_comment||'',       // AI suggestion (kept separate)
        errorName:e.error_name||'',    // tên loại lỗi (Sai số ít/số nhiều, ...)
        saved:false,
        skipped:false,
        deleted:false,
        showAi:false,
      };
    });
    activeId=null;
    showResult(correctedHtml);
  }catch(err){
    const b=$('#error-banner');
    b.textContent=err.message;
    b.style.display='block';
  }
  btn.disabled=false;
  btn.textContent='Chấm bài';
  checkGradeBtn();
}

// ════ Parse errors: extract wrong/right text from corrected_html ════
function parseErrors(errArr,html){
  // Use a temp div to extract span contents safely
  const tmp=document.createElement('div');
  tmp.innerHTML=html;
  return errArr.map(e=>{
    // Spans use class='grammar' or 'vocabulary' from API
    const span=tmp.querySelector('span[id="'+e.id+'"]');
    const wrong=span?.querySelector('s')?.textContent||'';
    const right=span?.querySelector('mark')?.textContent||'';
    return {...e, wrong, right};
  });
}

// ════ Show result view ════
function showResult(correctedHtml){
  $('#input-view').style.display='none';
  $('#result-view').style.display='block';

  // Render essay with custom span classes (err-grammar / err-vocab)
  const essayView=$('#essay-view');
  // Convert API spans (class='grammar'/'vocabulary') → our internal classes
  const transformed=correctedHtml
    .replace(/class=['"]grammar['"]/g,'class="err-grammar"')
    .replace(/class=['"]vocabulary['"]/g,'class="err-vocab"')
    .replace(/\n/g,'<br>');
  essayView.innerHTML=transformed;

  // Click handlers
  essayView.querySelectorAll('span.err-grammar, span.err-vocab').forEach(span=>{
    span.addEventListener('click',()=>{
      if(cardStates[span.id]?.deleted) return;
      selectError(span.id);
    });
  });

  renderCards();
  updateStats();
}

// ════ Render cards using DOM (NOT innerHTML for safety) ════
function renderCards(){
  const area=$('#cards-area');
  area.innerHTML='';
  const visible=errors.filter(e=>!cardStates[e.id]?.deleted);

  if(!visible.length){
    const empty=document.createElement('div');
    empty.className='cards-empty';
    empty.textContent=errors.length?'Tất cả nhận xét đã được xoá':'Bài này không có lỗi 🎉';
    area.appendChild(empty);
    return;
  }

  visible.forEach((err,i)=>{
    area.appendChild(buildCard(err,i+1));
  });
}

function buildCard(err,index){
  const st=cardStates[err.id];
  const isGr=err.type==='grammar';
  const isActive=err.id===activeId;
  const hasText=st.text && st.text.trim();

  const card=document.createElement('div');
  card.className='cmt';
  card.id='card-'+err.id;
  if(isActive) card.classList.add('is-active');
  if(st.saved && hasText) card.classList.add('is-approved');
  if(st.saved && !hasText || st.skipped) card.classList.add('is-skipped');
  card.addEventListener('click',()=>selectError(err.id));

  // ── HEAD ──
  const head=document.createElement('div');
  head.className='cmt-head';

  if(st.saved && hasText){
    const ck=document.createElement('span');
    ck.className='cmt-checkmark';
    ck.textContent='✓';
    head.appendChild(ck);
  }

  const badge=document.createElement('span');
  badge.className='cmt-badge '+(isGr?'gr':'lr');
  badge.textContent=isGr?'GR':'LR';
  head.appendChild(badge);

  const corr=document.createElement('div');
  corr.className='cmt-correction'+(isGr?'':' lr');
  if(err.wrong){
    const s=document.createElement('s');
    s.textContent=err.wrong;
    corr.appendChild(s);
  }
  if(err.wrong && err.right){
    const arrow=document.createElement('span');
    arrow.className='cmt-arrow';
    arrow.textContent='→';
    corr.appendChild(arrow);
  }
  if(err.right){
    const m=document.createElement('mark');
    m.textContent=err.right;
    corr.appendChild(m);
  }
  head.appendChild(corr);

  const num=document.createElement('span');
  num.className='cmt-num';
  num.textContent='#'+index;
  head.appendChild(num);

  card.appendChild(head);

  // Sub-head with error name (if present)
  if(st.errorName){
    const sub=document.createElement('div');
    sub.className='cmt-subhead';
    sub.textContent=st.errorName;
    card.appendChild(sub);
  }

  // ── BODY ──
  const body=document.createElement('div');
  body.className='cmt-body';

  // SAVED state — readonly view
  if(st.saved){
    const txt=document.createElement('div');
    txt.className='cmt-text';
    if(hasText){
      txt.innerHTML=renderBold(st.text);
    } else {
      const skip=document.createElement('span');
      skip.className='cmt-text-skipped';
      skip.textContent='— Bỏ qua, không nhận xét lỗi này —';
      txt.appendChild(skip);
    }
    body.appendChild(txt);
  } else {
    // EDITING state — textarea + AI hint
    const ta=document.createElement('textarea');
    ta.className='cmt-textarea';
    ta.id='ta-'+err.id;
    ta.value=st.text;
    ta.placeholder='Nhập nhận xét cho học sinh…';
    ta.addEventListener('click',e=>e.stopPropagation());
    ta.addEventListener('input',()=>{
      cardStates[err.id].text=ta.value;
      ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';
    });
    body.appendChild(ta);
    setTimeout(()=>{ta.style.height='auto';ta.style.height=Math.max(64,ta.scrollHeight)+'px';},10);

    // AI hint section
    if(st.aiText){
      const hint=document.createElement('div');
      hint.className='ai-hint';

      const aiBtn=document.createElement('button');
      aiBtn.className='btn-ai';
      aiBtn.innerHTML='<span class="icon">💡</span>'+(st.showAi?'Ẩn gợi ý AI':'Tham khảo gợi ý AI');
      aiBtn.addEventListener('click',e=>{
        e.stopPropagation();
        cardStates[err.id].showAi=!st.showAi;
        renderCards();
      });
      hint.appendChild(aiBtn);

      if(st.showAi){
        const panel=document.createElement('div');
        panel.className='ai-panel show';

        const lbl=document.createElement('div');
        lbl.className='ai-label';
        lbl.textContent='💡 GỢI Ý CỦA AI';
        panel.appendChild(lbl);

        const aiTxt=document.createElement('div');
        aiTxt.className='ai-text';
        aiTxt.innerHTML=renderBold(st.aiText);
        panel.appendChild(aiTxt);

        const aiAct=document.createElement('div');
        aiAct.className='ai-actions';
        const useBtn=document.createElement('button');
        useBtn.className='btn-use-ai';
        useBtn.textContent='✓ Dùng comment này';
        useBtn.addEventListener('click',e=>{
          e.stopPropagation();
          cardStates[err.id].text=st.aiText;
          cardStates[err.id].showAi=false;
          renderCards();
        });
        aiAct.appendChild(useBtn);
        panel.appendChild(aiAct);

        hint.appendChild(panel);
      }
      body.appendChild(hint);
    }
  }
  card.appendChild(body);

  // ── ACTIONS ──
  const actions=document.createElement('div');
  actions.className='cmt-actions';

  if(st.saved){
    actions.appendChild(makeBtn('Sửa lại','btn-edit',e=>{e.stopPropagation();editAgain(err.id);}));
    actions.appendChild(makeBtn('✗','btn-delete',e=>{e.stopPropagation();deleteCard(err.id);}));
  } else {
    actions.appendChild(makeBtn('✓ Lưu','btn-save',e=>{e.stopPropagation();saveCard(err.id);}));
    actions.appendChild(makeBtn('Bỏ qua','btn-cancel',e=>{e.stopPropagation();skipCard(err.id);}));
    actions.appendChild(makeBtn('✗','btn-delete',e=>{e.stopPropagation();deleteCard(err.id);}));
  }
  card.appendChild(actions);

  return card;
}

function makeBtn(text,cls,onClick){
  const b=document.createElement('button');
  b.className='btn-sm '+cls;
  b.textContent=text;
  b.addEventListener('click',onClick);
  return b;
}

// ════ Card actions ════
function selectError(id){
  if(activeId){
    const prev=document.querySelector('.essay-view span[id="'+activeId+'"]');
    if(prev) prev.classList.remove('is-active');
    const prevCard=document.getElementById('card-'+activeId);
    if(prevCard) prevCard.classList.remove('is-active');
  }
  activeId=id;
  const span=document.querySelector('.essay-view span[id="'+id+'"]');
  if(span){span.classList.add('is-active');span.scrollIntoView({block:'nearest',behavior:'smooth'});}
  const card=document.getElementById('card-'+id);
  if(card){card.classList.add('is-active');card.scrollIntoView({block:'nearest',behavior:'smooth'});}
}

// Save: lock card with whatever's in textarea (text or empty)
function saveCard(id){
  const ta=document.getElementById('ta-'+id);
  if(ta) cardStates[id].text=ta.value.trim();
  cardStates[id].saved=true;
  cardStates[id].skipped=false;
  cardStates[id].showAi=false;
  const sp=document.querySelector('.essay-view span[id="'+id+'"]');
  if(sp){
    if(cardStates[id].text) sp.classList.add('is-approved');
    sp.classList.remove('is-active');
  }
  if(activeId===id) activeId=null;
  updateStats();renderCards();
}

// Skip: save with empty text (mark as "không cần comment")
function skipCard(id){
  cardStates[id].text='';
  cardStates[id].saved=true;
  cardStates[id].skipped=true;
  cardStates[id].showAi=false;
  const sp=document.querySelector('.essay-view span[id="'+id+'"]');
  if(sp) sp.classList.remove('is-active');
  if(activeId===id) activeId=null;
  updateStats();renderCards();
}

// Edit again: unlock
function editAgain(id){
  cardStates[id].saved=false;
  cardStates[id].skipped=false;
  const sp=document.querySelector('.essay-view span[id="'+id+'"]');
  if(sp) sp.classList.remove('is-approved');
  updateStats();renderCards();selectError(id);
  setTimeout(()=>{const ta=document.getElementById('ta-'+id);if(ta){ta.focus();ta.setSelectionRange(ta.value.length,ta.value.length);}},30);
}

function deleteCard(id){
  cardStates[id].deleted=true;
  const sp=document.querySelector('.essay-view span[id="'+id+'"]');
  if(sp){sp.classList.remove('is-approved','is-active');sp.classList.add('is-deleted');}
  if(activeId===id) activeId=null;
  updateStats();renderCards();
}

// Apply AI comment to ALL unsaved cards
function useAiForAll(){
  let n=0;
  errors.forEach(e=>{
    const st=cardStates[e.id];
    if(!st.deleted && !st.saved && st.aiText && !st.text.trim()){
      st.text=st.aiText;
      n++;
    }
  });
  if(n){updateStats();renderCards();}
}

function copyAll(){
  const filled=errors.filter(e=>{
    const st=cardStates[e.id];
    return st && !st.deleted && st.saved && st.text && st.text.trim();
  });
  if(!filled.length) return;
  const parts=filled.map(e=>{
    const tag=e.type==='grammar'?'GR':'LR';
    const corr=(e.wrong||'')+(e.wrong&&e.right?' → ':'')+(e.right||'');
    return `[${tag}] ${corr}\n${cardStates[e.id].text}`;
  });
  navigator.clipboard?.writeText(parts.join('\n\n')).then(()=>{
    const b=$('#btn-copy-all');
    const orig=b.textContent;
    b.textContent='✓ Đã copy '+filled.length+' nhận xét!';
    setTimeout(()=>b.textContent=orig,2200);
  });
}

function updateStats(){
  const total=errors.filter(e=>!cardStates[e.id]?.deleted).length;
  const filled=errors.filter(e=>{
    const st=cardStates[e.id];
    return st && !st.deleted && st.saved && st.text && st.text.trim();
  }).length;
  $('#stat-total').textContent=total+' lỗi';
  $('#stat-approved').textContent=filled+' nhận xét';
  $('#btn-copy-all').disabled=filled===0;
  // Enable "Dùng AI" if any unsaved + empty card has aiText
  const hasUnsavedEmpty=errors.some(e=>{
    const st=cardStates[e.id];
    return st && !st.deleted && !st.saved && st.aiText && !st.text.trim();
  });
  $('#btn-approve-all').disabled=!hasUnsavedEmpty;
}

function resetAll(){
  errors=[];cardStates={};activeId=null;
  $('#essay').value='';
  $('#word-count').textContent='0 từ';
  $('#word-count').className='word-count low';
  $('#error-banner').style.display='none';
  $('#input-view').style.display='block';
  $('#result-view').style.display='none';
  $('#cards-area').innerHTML='<div class="cards-empty">Nhập API key + bài viết<br>rồi nhấn "Chấm bài" để xem nhận xét</div>';
  $('#stat-total').textContent='0 lỗi';
  $('#stat-approved').textContent='0 nhận xét';
  $('#btn-copy-all').disabled=true;
  $('#btn-approve-all').disabled=true;
  checkGradeBtn();
}
</script>
